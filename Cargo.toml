cargo-features = ["profile-rustflags"]

[package]
name = "flowstate"
version = "0.1.0"
edition = "2024"
default-run = "flowstate"

[workspace]
members = [".", "crates/flowstate-document", "crates/flowstate-docx", "crates/flowstate-flow"]
resolver = "3"

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.5", features = ["derive"] }
fff-search = "0.8.2-nightly.ffb39a8"
flowstate-document = { path = "crates/flowstate-document" }
flowstate-docx = { path = "crates/flowstate-docx" }
gpui = "0.2.2"
gpui-component = "0.5.1"
gpui-component-assets = "0.5.1"
crop = "0.4.3"
imagesize = "0.13"
mathjax_svg = "3.2.0"
resvg = "0.45.1"
rustc-hash = "2"
unicode-segmentation = "1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.23.1", features = ["serde", "v4"] }
tempfile = "3"
dir = "0.1.2"
dirs = "6.0.0"
mimalloc = "0.1.52"
flowstate-flow = { version = "0.1.0", path = "crates/flowstate-flow" }
hotpath = "0.16.1"

[features]
hotpath = [
  "hotpath/hotpath",
  "flowstate-document/hotpath",
  "flowstate-docx/hotpath",
  "flowstate-flow/hotpath",
]
hotpath-cpu = [
  "hotpath",
  "hotpath/hotpath-cpu",
  "flowstate-document/hotpath-cpu",
  "flowstate-docx/hotpath-cpu",
  "flowstate-flow/hotpath-cpu",
]
hotpath-alloc = [
  "hotpath",
  "hotpath/hotpath-alloc",
  "flowstate-document/hotpath-alloc",
  "flowstate-docx/hotpath-alloc",
  "flowstate-flow/hotpath-alloc",
]
profiler = ["hotpath", "hotpath-alloc"]

[target.'cfg(target_os = "macos")'.dependencies]
gpui-symbols = { version = "0.6.1", features = ["component"] }

[target.'cfg(any(target_os = "linux", target_os = "freebsd"))'.dependencies]
cosmic-text = { version = "0.14.2", default-features = false, features = ["shape-run-cache"] }

[patch.crates-io]
gpui-component = { path = "vendor/gpui-component" }

[profile.release]
rustflags = ["-Z", "threads=8"]
incremental = true

[profile.profiler]
inherits = "release"
opt-level = 3
overflow-checks = false
debug = true
strip = false

[profile.product]
inherits = "release"
opt-level = 3
incremental = false
overflow-checks = false
strip = true
lto = "fat"
codegen-units = 1
rustflags = [
  "-C", "target-cpu=native",
  "-Z", "tune-cpu=native",
]
