[package]
name = "flowstate-docx"
version.workspace = true
edition.workspace = true
publish.workspace = true

[lints]
workspace = true

[dependencies]
docx-rs = { workspace = true }
docxide-pdf = { workspace = true }
flowstate-document = { workspace = true }
gpui = { version = "0.2.2", default-features = false }
hotpath = { workspace = true }
lopdf = { workspace = true }
quick-xml = { workspace = true }
rdocx = { workspace = true }
rdocx-opc = { workspace = true }
rdocx-oxml = { workspace = true }
rustc-hash = { workspace = true }
zip = { workspace = true }
zstd = { workspace = true }

[target.'cfg(any(target_os = "macos", target_os = "linux"))'.dependencies]
hotpath-cpu-support = { workspace = true, optional = true }

[features]
hotpath = ["hotpath/hotpath", "flowstate-document/hotpath"]
hotpath-cpu = ["hotpath", "dep:hotpath-cpu-support", "flowstate-document/hotpath-cpu"]
hotpath-alloc = ["hotpath", "hotpath/hotpath-alloc", "flowstate-document/hotpath-alloc"]
