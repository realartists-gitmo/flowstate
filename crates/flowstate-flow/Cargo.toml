[package]
name = "flowstate-flow"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
anyhow = "1.0.102"
flowstate-collab = { version = "0.1.0", path = "../flowstate-collab" }
hotpath = "0.16.1"
postcard = { version = "1.1.3", features = ["use-std"] }
rustc-hash = "2.1.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
uuid = { version = "1.23.1", features = ["v4", "serde"] }

[features]
hotpath = ["hotpath/hotpath"]
hotpath-cpu = ["hotpath"]
hotpath-alloc = ["hotpath", "hotpath/hotpath-alloc"]
