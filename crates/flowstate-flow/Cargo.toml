[package]
name = "flowstate-flow"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
hotpath = "0.16.1"
rustc-hash = "2.1.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
uuid = { version = "1.23.1", features = ["v4", "serde"] }

[features]
hotpath = ["hotpath/hotpath"]
hotpath-cpu = ["hotpath", "hotpath/hotpath-cpu"]
hotpath-alloc = ["hotpath", "hotpath/hotpath-alloc"]
