[package]
name = "flowstate-document"
version = "0.1.0"
edition = "2024"

[dependencies]
crop = "0.4.3"
gpui = "0.2.2"
hotpath = "0.16.1"
rustc-hash = "2.1.2"
serde = { version = "1.0", features = ["derive"] }
tempfile = "3"
uuid = { version = "1.23.1", features = ["serde", "v4"] }

[features]
hotpath = ["hotpath/hotpath"]
hotpath-cpu = ["hotpath", "hotpath/hotpath-cpu"]
hotpath-alloc = ["hotpath", "hotpath/hotpath-alloc"]
